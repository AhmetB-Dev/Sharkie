  <body onload="boot()">
    <h1>Sharkie</h1>
    <div id="startScreen"></div>
    <canvas id="canvas" width="720" height="480"></canvas>
    <div id="rotateOverlay">
      <div class="rotateCard">
        <div class="phone"></div>
        <h2>Bitte drehen</h2>
      </div>
    </div>

    <template id="startScreenTemplate">
      <div class="startCard">
        <h2 class="startTitle">SHARKIE</h2>

        <div class="startActions">
          <button id="startBtn" type="button" class="pillBtn">START</button>
          <button id="settingsBtn" type="button" class="pillBtn">SETTINGS</button>
          <button id="fsBtn" type="button" class="pillBtn">FULLSCREEN</button>
          <button id="impressumBtn" type="button" class="pillBtn pillBtnSmall">IMPRESSUM</button>
        </div>

        <div id="settingsPanel" class="settingsPanel">
          <h3 class="panelTitle">Settings</h3>

          <label class="settingRow">
            <span>Sound</span>
            <input id="soundToggle" type="checkbox" />
          </label>

          <div class="settingRow">
            <span>Controls</span>
            <button id="controlsBtn" type="button" class="inlineActionBtn">OPEN</button>
          </div>

          <div class="settingsActions">
            <button id="closeSettingsBtn" type="button" class="inlineActionBtn">BACK</button>
          </div>
        </div>

        <div id="controlsPanel" class="settingsPanel">
          <h3 class="panelTitle">Controls</h3>

          <div class="controlsBlock">
            <div class="controlsGrid">
              <img class="controlsImg" src="assets/assets_sharkie/6.Botones/controls_primary.png" />
              <img class="controlsImg" src="assets/assets_sharkie/6.Botones/controls_alternative.png" />
            </div>
          </div>
          <div class="controlsBlock">
            <table class="controlsTable">
              <thead>
                <tr>
                  <th>Enemy</th>
                  <th>Keys</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Puffer Fish</td>
                  <td><span class="keyPill">J</span> <span class="keyPill">Z|Y</span></td>
                </tr>
                <tr>
                  <td>Jelly Fish</td>
                  <td><span class="keyPill">K</span> <span class="keyPill">X</span></td>
                </tr>
                <tr>
                  <td>Orca (Boss)</td>
                  <td><span class="keyPill">L</span> <span class="keyPill">C</span></td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="settingsActions">
            <button id="closeControlsBtn" type="button" class="inlineActionBtn">BACK</button>
          </div>
        </div>
        <div id="impressumPanel" class="settingsPanel">
          <h3 class="panelTitle">Impressum</h3>

          <div class="legalText">
            <p>
              <strong>Betreiber:</strong><br />
              <span class="legalPlaceholder">Ahmet Balci</span><br />
            </p>

            <p>
              <strong>Kontakt</strong><br />
              E-Mail: <span class="legalPlaceholder">Ahmet_Ba@web.de</span>
            </p>

            <p>
              <strong>HAFTUNGSAUSSCHLUSS</strong><br />

          </div>

          <div class="settingsActions">
            <button id="closeImpressumBtn" type="button" class="inlineActionBtn">BACK</button>
          </div>
        </div>
      </div>
    </template>
